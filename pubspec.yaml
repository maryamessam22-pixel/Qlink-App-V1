name: qlink
description: Qlink - Dual-role safety and tracking system
publish_to: 'none'
version: 2.4.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Supabase
  supabase_flutter: ^2.12.4

  # Navigation
  go_router: ^13.2.5

  # Maps
  flutter_map: ^6.2.1
  latlong2: ^0.9.1

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # Fonts & UI
  google_fonts: ^6.3.3
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0

  # File handling
  file_picker: ^8.0.7
  image_picker: ^1.2.1
  path_provider: ^2.1.5

  # PDF
  pdf: ^3.12.0
  printing: ^5.13.1

  # Permissions
  permission_handler: ^11.4.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  geolocator: ^12.0.0
  fl_chart: ^0.69.2
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
